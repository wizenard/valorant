/* === Design System: Product Register, Restrained === */
:root {
  /* Core palette - deep navy, not black */
  --bg: #0b1120;
  --surface: #111827;
  --surface-2: #1a2332;
  --surface-3: #1f2b3d;
  
  /* Border - subtle, not glowing */
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --border-active: rgba(130, 180, 255, 0.3);
  
  /* Text hierarchy */
  --text: #e8edf5;
  --text-secondary: #8b9bb4;
  --text-tertiary: #5a6a80;
  
  /* Accent - muted blue, not red */
  --accent: #4a9eff;
  --accent-soft: rgba(74, 158, 255, 0.12);
  --accent-hover: #6bb3ff;
  
  /* Role colors - desaturated */
  --duelist: #e85d5d;
  --initiator: #5db8e8;
  --controller: #9b6be8;
  --sentinel: #5de89b;
  
  /* Shadows - minimal, functional */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.3);
  
  /* Radius - differentiated, not uniform */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  
  /* Transitions - functional, not decorative */
  --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --duration-fast: 150ms;
  --duration-normal: 200ms;
}

a {

a:hover { color: var(--accent-hover); }

<div class="app">
  <aside class="sidebar">
    <h1>无畏契约 <small>Valorant 特工技能总览</small></h1>
    <div class="intro">
      当前页面使用本地媒体资源。肖像、背景、技能图标和技能视频已经下载到同目录下的 <strong>特工技能</strong> 文件夹。
      <br>参考来源：
      <a href="https://playvalorant.com/zh-tw/agents/" target="_blank" rel="noreferrer">台服特工页</a>
      ·
      <a href="https://val.qq.com/game-data.html?pageType=1&&heroId=23" target="_blank" rel="noreferrer">国服游戏官网资料</a>
    </div>
    <div class="sbar"><input id="search" placeholder="搜索特工名、英文名、台服名、slug..." oninput="renderList()"></div>
    <div class="tags" id="tags"></div>
    <div class="cnt" id="count"></div>

const ROLE_COLORS = {"决斗": "#ff6a5b", "先锋": "#5fd0ff", "控场": "#a873ff", "哨卫": "#7edc8d"};
let currentRole = 'all';
let currentSlug = null;
let currentView = 'agents';

function colorForRole(role) {
  return ROLE_COLORS[role] || '#93a0ad';
}

function pill(text, color) {
  return '<span class="pill" style="color:' + color + '">' + text + '</span>';
}

function initTags() {
  const roles = [];
  const seen = new Set();
  AGENTS.forEach(agent => {
    if (!seen.has(agent.role)) {
      seen.add(agent.role);
      roles.push(agent.role);
    }
  });
  const tags = document.getElementById('tags');
  let html = '<button class="tag' + (currentRole === 'all' ? ' on' : '') + '" onclick="setRole(\'all\')">全部</button>';
  roles.forEach(role => {
    html += '<button class="tag' + (currentRole === role ? ' on' : '') + '" onclick="setRole(\'' + role + '\')">' + role + '</button>';
  });
  tags.innerHTML = html;
}

function setRole(role) {
  currentRole = role;
  initTags();
  renderList();
}

function filteredAgents() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  return AGENTS.filter(agent => {
    if (currentRole !== 'all' && agent.role !== currentRole) {
      return false;
    }
    if (!query) {
      return true;
    }
    return (agent.aliases || '').toLowerCase().includes(query);
  });
}

function renderList() {
  const list = filteredAgents();
  document.getElementById('count').textContent = list.length + ' / ' + AGENTS.length + ' 名特工';
  document.getElementById('list').innerHTML = list.map(agent => {
    const checked = agent.slug === currentSlug ? ' checked' : '';
    return '<div class="agent' + checked + '" onclick="openAgent(\'' + agent.slug + '\')">'
      + '<img src="' + agent.portrait + '" alt="' + agent.name + '" loading="lazy">'
      + '<div class="i">'
      + '<div class="n">' + agent.name + '</div>'
      + '<div class="s">' + agent.eName + ' · 台服名 ' + agent.twName + '</div>'
      + '<div class="meta">' + pill(agent.role, colorForRole(agent.role)) + '</div>'
      + '</div></div>';
  }).join('');
}

function setView(view) {
  currentView = view === 'maps' ? 'maps' : 'agents';
  const isAgents = currentView === 'agents';
  if (location.hash !== (isAgents ? '#agents' : '#maps')) {
    location.hash = isAgents ? 'agents' : 'maps';
  }
  document.getElementById('agentsTab').classList.toggle('on', isAgents);
  document.getElementById('mapsTab').classList.toggle('on', !isAgents);
  document.getElementById('search').parentElement.style.display = isAgents ? 'block' : 'none';
  document.getElementById('tags').style.display = isAgents ? 'flex' : 'none';
  document.getElementById('count').style.display = isAgents ? 'block' : 'none';
  document.getElementById('list').style.display = isAgents ? 'grid' : 'none';
  document.getElementById('mapsSidebarPanel').classList.toggle('hidden', isAgents);
  document.getElementById('mapsShell').style.display = isAgents ? 'none' : 'block';
  document.getElementById('noSel').style.display = isAgents && !currentSlug ? 'flex' : 'none';
  document.getElementById('detail').style.display = isAgents && currentSlug ? 'block' : 'none';
}

function openAgent(slug) {
  setView('agents');
  currentSlug = slug;
  const agent = AGENTS.find(item => item.slug === slug);
  if (!agent) {
    return;
  }

  document.getElementById('noSel').style.display = 'none';
  const detail = document.getElementById('detail');
  detail.style.display = 'block';

  let html = '<section class="hero-top" style="background-image:url(\'' + agent.background + '\')">'
    + '<div class="hero-head">'
    + '<img src="' + agent.portrait + '" alt="' + agent.name + '">'
    + '<div class="hero-info">'
    + '<h2>' + agent.name + '</h2>'
    + '<div class="en">' + agent.eName.toUpperCase() + '</div>'
    + '<div class="role-row">' + pill(agent.role, colorForRole(agent.role)) + '</div>'
    + '<div class="desc">' + agent.description + '</div>'
    + '<div class="src">台服对应特工名：' + agent.twName + ' · 本地资源目录：' + agent.assetFolder + '</div>'
    + '</div></div></section>';

  html += '<div class="skill-tabs">';
  agent.skills.forEach((skill, index) => {
    html += '<button class="' + (index === 0 ? 'on' : '') + '" onclick="switchSkill(this, \'' + skill.key + '\')">'
      + '<img src="' + skill.icon + '" alt="' + skill.name + '">'
      + '<span><span class="key">' + skill.slotKey + '</span><span class="slot">' + (skill.typeName || '技能') + '</span></span>'
      + '</button>';
  });
  html += '</div>';

  agent.skills.forEach((skill, index) => {
    const metaParts = [skill.slotKey];
    if (skill.typeName) metaParts.push(skill.typeName);
    if (skill.cost) metaParts.push('费用：' + skill.cost);

    html += '<section class="skill-panel' + (index === 0 ? ' on' : '') + '" data-skill="' + skill.key + '">'
      + '<div class="skill-head">'
      + '<img src="' + skill.icon + '" alt="' + skill.name + '">'
      + '<div class="skill-copy">'
      + '<h3>' + skill.name + '</h3>'
      + '<div class="meta">' + metaParts.join(' · ') + '</div>'
      + '<div class="desc">' + skill.description + '</div>'
      + (skill.twName && skill.twName !== skill.name ? '<div class="tw-note">台服技能名：' + skill.twName + '</div>' : '')
      + '</div></div>'
      + (skill.video
        ? '<div class="video-wrap"><video controls preload="metadata" playsinline><source src="' + skill.video + '" type="video/mp4"></video><div class="video-meta">本地演示视频：' + skill.video + '</div></div>'
        : '<div class="video-empty">当前技能没有匹配到官方演示视频，已保留本地图标和文案。</div>')
      + '</section>';
  });

  detail.innerHTML = html;
  document.querySelector('.main').scrollTop = 0;
  renderList();
}

function switchSkill(button, key) {
  button.parentElement.querySelectorAll('button').forEach(item => item.className = '');
  button.className = 'on';

  const panels = document.querySelectorAll('.skill-panel');
  panels.forEach(panel => panel.className = 'skill-panel');
  const active = document.querySelector('.skill-panel[data-skill="' + key + '"]');
  if (!active) {
    return;
  }
  active.className = 'skill-panel on';

  const activeVideo = active.querySelector('video');
  document.querySelectorAll('video').forEach(video => {
    if (video !== activeVideo) video.pause();
  });
}

let currentMapSlug = null;
let currentMapMarker = null;

function escapeHtml(text) {
  return String(text || '').replace(/[&<>"]/g, function(char) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char];
  });
}

function getMapsData() {
  if (window.MAPS_DATA && window.MAPS_DATA.length) {
    return window.MAPS_DATA;
  }
  if (typeof MAPS_DATA !== 'undefined' && MAPS_DATA.length) {
    return MAPS_DATA;
  }
  return [];
}

function filteredMaps() {
  const query = document.getElementById('mapSearch') ? document.getElementById('mapSearch').value.trim().toLowerCase() : '';
  return getMapsData().filter(map => {
    if (!query) {
      return true;
    }
    return (map.aliases || '').toLowerCase().includes(query);
  });
}

function openMap(slug) {

  detail.innerHTML = '<section class="map-hero" style="background-image:url(\'' + map.splash + '\')">'

    + '</div></section>'
    + '<div class="map-layout">'

    + '<div class="map-stage-head">'
    + '<h4>离线小地图</h4>'
    + '<div class="map-toolbar"><button type="button" onclick="resetMapView(\'' + map.slug + '\')">重置视图</button><span class="map-list-note">滚轮缩放，按住拖拽</span></div>'
    + '</div>'
    + '<div class="map-stage" id="map-stage-' + map.slug + '">'
    + '<div class="map-canvas" id="map-canvas-' + map.slug + '">'
    + '<img src="' + map.minimap + '" alt="' + escapeHtml(map.name) + ' minimap">'
    + (map.markers || []).map(marker =>
        '<button class="map-marker" type="button" title="' + escapeHtml(marker.label) + '" data-map-marker="' + escapeHtml(marker.label) + '" onclick="focusMapMarker(\'' + map.slug + '\', \'' + encodeURIComponent(marker.label) + '\')" style="left:' + (marker.x * 100).toFixed(3) + '%;top:' + (marker.y * 100).toFixed(3) + '%;"></button>'
      ).join('')
    + '</div></div></section>'
    + '<aside class="map-list-card">'
    + '<div class="map-list-head"><h4>点位列表</h4><span class="map-list-note">' + ((map.markers || []).length) + ' 个标记</span></div>'
    + '<div class="map-callouts">' + callouts + '</div>'
    + '</aside></div>';

  detail.className = 'map-detail on';
  renderMaps();
  mountMapViewer(map.slug);
}

function renderMaps() {
  const maps = filteredMaps();
  document.getElementById('mapCount').textContent = maps.length + ' / ' + getMapsData().length + ' maps';
  document.getElementById('mapSidebarList').innerHTML = maps.map(map => {
    const checked = map.slug === currentMapSlug ? ' on' : '';
    return '<button class="map-side-item' + checked + '" type="button" onclick="openMap(\'' + map.slug + '\')">'
      + '<img src="' + map.splash + '" alt="' + escapeHtml(map.name) + '" loading="lazy">'
      + '<span><span class="n">' + escapeHtml(map.name) + '</span><span class="s">' + escapeHtml(map.eName) + ' <em class="map-mode-badge">' + escapeHtml(map.category) + '</em></span></span>'
      + '</button>';
  }).join('');
}

function ensureMapState(slug) {
  const stage = document.getElementById('map-stage-' + slug);
  if (!stage) return null;
  if (!stage._mapState) {
    stage._mapState = { scale: 1, x: 0, y: 0 };
  }
  return stage._mapState;
}

function applyMapTransform(slug) {
  const canvas = document.getElementById('map-canvas-' + slug);
  const state = ensureMapState(slug);
  if (!canvas || !state) return;
  canvas.style.transform = 'translate(' + state.x + 'px,' + state.y + 'px) scale(' + state.scale + ')';
}

function resetMapView(slug) {
  const state = ensureMapState(slug);
  if (!state) return;
  state.scale = 1;
  state.x = 0;
  state.y = 0;
  applyMapTransform(slug);
}

function focusMapMarker(slug, encodedLabel) {
  const label = decodeURIComponent(encodedLabel);
  currentMapMarker = label;
  const map = getMapsData().find(item => item.slug === slug);
  const marker = map && (map.markers || []).find(item => item.label === label);
  const stage = document.getElementById('map-stage-' + slug);
  const state = ensureMapState(slug);
  if (marker && stage && state) {
    const width = stage.clientWidth;
    const height = stage.clientHeight;
    state.scale = Math.max(state.scale, 1.9);
    state.x = width / 2 - marker.x * width * state.scale;
    state.y = height / 2 - marker.y * height * state.scale;
    applyMapTransform(slug);
  }

  document.querySelectorAll('[data-map-marker]').forEach(node => {
    node.classList.toggle('on', node.getAttribute('data-map-marker') === label);
  });
  document.querySelectorAll('[data-map-label]').forEach(node => {
    node.classList.toggle('on', node.getAttribute('data-map-label') === label);
  });
}

function mountMapViewer(slug) {
  const stage = document.getElementById('map-stage-' + slug);
  if (!stage || stage.dataset.bound === '1') return;
  stage.dataset.bound = '1';
  const state = ensureMapState(slug);
  let dragging = false;
  let startX = 0;
  let startY = 0;
  let originX = 0;
  let originY = 0;

  stage.addEventListener('wheel', function(event) {
    event.preventDefault();
    const rect = stage.getBoundingClientRect();
    const pointerX = event.clientX - rect.left;
    const pointerY = event.clientY - rect.top;
    const nextScale = Math.max(1, Math.min(4, state.scale + (event.deltaY < 0 ? 0.18 : -0.18)));
    const ratio = nextScale / state.scale;
    state.x = pointerX - (pointerX - state.x) * ratio;
    state.y = pointerY - (pointerY - state.y) * ratio;
    state.scale = nextScale;
    applyMapTransform(slug);
  }, { passive: false });

  stage.addEventListener('pointerdown', function(event) {
    dragging = true;
    startX = event.clientX;
    startY = event.clientY;
    originX = state.x;
    originY = state.y;
    stage.setPointerCapture(event.pointerId);
  });

  stage.addEventListener('pointermove', function(event) {
    if (!dragging) return;
    state.x = originX + (event.clientX - startX);
    state.y = originY + (event.clientY - startY);
    applyMapTransform(slug);
  });

  function stopDrag(event) {
    if (!dragging) return;
    dragging = false;
    if (event && stage.hasPointerCapture(event.pointerId)) {
      stage.releasePointerCapture(event.pointerId);
    }
  }

  stage.addEventListener('pointerup', stopDrag);
  stage.addEventListener('pointercancel', stopDrag);
  stage.addEventListener('dblclick', function() {
    resetMapView(slug);
  });

  applyMapTransform(slug);
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && currentView === 'agents' && currentSlug) {
    currentSlug = null;
    document.getElementById('detail').style.display = 'none';
    document.getElementById('detail').innerHTML = '';
    document.getElementById('noSel').style.display = 'flex';
    document.querySelectorAll('video').forEach(video => video.pause());
    renderList();
    return;
  }

  if (!currentSlug) {
    return;
  }

  const key = event.key.toUpperCase();
  const target = Array.from(document.querySelectorAll('.skill-tabs .key')).find(node => node.textContent === key);
  if (target) {
    target.parentElement.parentElement.click();
  }
});

initTags();
renderList();
renderMaps();
if (getMapsData().length) {
  openMap(getMapsData()[0].slug);
}
setView(location.hash === '#maps' ? 'maps' : 'agents');

/* === GSAP Animations === */
(function() {
  if (typeof gsap === 'undefined') return;

  function playEntrance() {
    var tl = gsap.timeline({ defaults: { ease: "power2.out" } });
    tl.from(".sidebar h1", { opacity: 0, y: -16, duration: 0.5 })
      .from(".intro", { opacity: 0, y: 12, duration: 0.4 }, "-=0.2")
      .from(".sbar", { opacity: 0, y: 12, duration: 0.35 }, "-=0.15")
      .from(".tags .tag", { opacity: 0, scale: 0.9, duration: 0.3, stagger: 0.04 }, "-=0.1")
      .from(".view-tabs", { opacity: 0, y: 10, duration: 0.35 }, "-=0.1")
      .from(".no-sel", { opacity: 0, duration: 0.4 }, "-=0.2");
  }

  function animateList() {
    gsap.from("#list .agent", {
      opacity: 0, y: 14, duration: 0.35, stagger: 0.03,
      ease: "power2.out", clearProps: "opacity,transform"
    });
  }

  function animateDetail() {
    var tl = gsap.timeline({ defaults: { ease: "power2.out" } });
    tl.from(".hero-top", { opacity: 0, y: 24, duration: 0.45 })
      .from(".hero-top img", { opacity: 0, x: -20, duration: 0.4 }, "-=0.25")
      .from(".hero-info h2", { opacity: 0, y: 16, duration: 0.35 }, "-=0.2")
      .from(".skill-tabs button", { opacity: 0, scale: 0.9, duration: 0.3, stagger: 0.04 }, "-=0.15")
      .from(".skill-panel.on", { opacity: 0, y: 16, duration: 0.4 }, "-=0.15");
  }

  window._gsapSwitchSkill = function(panel) {
    if (!panel) return;
    gsap.fromTo(panel,
      { opacity: 0, y: 12 },
      { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }
    );
  };

  function animateMapDetail() {
    var tl = gsap.timeline({ defaults: { ease: "power2.out" } });
    tl.from(".map-hero", { opacity: 0, y: 20, duration: 0.45 })
      .from(".map-stage-card", { opacity: 0, y: 16, duration: 0.4 }, "-=0.2")
      .from(".map-list-card", { opacity: 0, y: 16, duration: 0.4 }, "-=0.3");
  }

  window._gsapViewSwitch = function(view) {
    if (view === 'agents') {
      gsap.from(".no-sel, #detail", { opacity: 0, x: 16, duration: 0.35, ease: "power2.out" });
    } else {
      gsap.from(".maps-shell", { opacity: 0, x: 16, duration: 0.35, ease: "power2.out" });
    }
  };

  // Hook into existing functions
  var origRenderList = window.renderList;
  if (origRenderList) {
    window.renderList = function() { origRenderList(); animateList(); };
  }

  var origRenderMaps = window.renderMaps;
  if (origRenderMaps) {
    window.renderMaps = function() { origRenderMaps(); animateMapCards(); };
  }

  var origOpenAgent = window.openAgent;
  if (origOpenAgent) {
    window.openAgent = function(slug) {
      origOpenAgent(slug);
      requestAnimationFrame(animateDetail);
    };
  }

  var origOpenMap = window.openMap;
  if (origOpenMap) {
    window.openMap = function(slug) {
      origOpenMap(slug);
      requestAnimationFrame(animateMapDetail);
    };
  }

  var origSetView = window.setView;
  if (origSetView) {
    window.setView = function(view) {
      origSetView(view);
      requestAnimationFrame(function() { window._gsapViewSwitch(view); });
    };
  }

  // Run entrance
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { requestAnimationFrame(playEntrance); });
  } else {
    requestAnimationFrame(playEntrance);
  }
})();

</script>
